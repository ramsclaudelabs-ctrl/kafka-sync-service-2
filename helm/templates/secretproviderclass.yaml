{{- if .Values.secretProviderClass.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProviderClass.name }}
spec:
  provider: azure
  secretObjects:
    - secretName: {{ .Release.Name }}-secret
      type: Opaque
      data:
        {{- range .Values.secretProviderClass.objects }}
        - objectName: {{ .objectAlias }}
          key: {{ .objectAlias }}
        {{- end }}
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.secretProviderClass.userAssignedIdentityID | quote }}
    keyvaultName: {{ .Values.secretProviderClass.keyvaultName | quote }}
    tenantId: {{ .Values.secretProviderClass.tenantId | quote }}
    objects: |
      array:
      {{- range .Values.secretProviderClass.objects }}
        - |
          objectName: {{ .objectName }}
          objectAlias: {{ .objectAlias }}
          objectType: secret
      {{- end }}
{{- end }}
