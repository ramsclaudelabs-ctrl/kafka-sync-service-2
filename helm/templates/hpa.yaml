{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
    - type: {{ .Values.hpa.metric.type }}
      external:
        metric:
          name: {{ .Values.hpa.metric.name }}
        target:
          type: AverageValue
          averageValue: {{ .Values.hpa.metric.targetAverageValue }}
{{- end }}
